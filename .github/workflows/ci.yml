name: CSCA CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Syntax check all Python files
      run: |
        echo "Checking syntax of all Python files..."
        find code/ -name "*.py" -exec python -m py_compile {} \;
        echo "All Python files passed syntax check."

    - name: Verify key files exist
      run: |
        test -f code/evaluation/cscqi.py && echo "cscqi.py exists"
        test -f code/hdm/hdm_trainer.py && echo "hdm_trainer.py exists"
        test -f code/hdm/han_network.py && echo "han_network.py exists"
        test -f code/hdm/ddpm_policy.py && echo "ddpm_policy.py exists"
        test -f code/channel/sim_channel.py && echo "sim_channel.py exists"
        test -f code/csca_pipeline.py && echo "csca_pipeline.py exists"
        echo "All key files present."
