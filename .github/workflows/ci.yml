name: CSCA Check
on: [push]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Check key files exist
      run: |
        test -f code/evaluation/cscqi.py
        test -f code/hdm/hdm_trainer.py
        test -f code/hdm/han_network.py
        test -f code/hdm/ddpm_policy.py
        test -f code/channel/sim_channel.py
        test -f code/csca_pipeline.py
        test -f README.md
        test -f requirements.txt
        echo "All key files present."
